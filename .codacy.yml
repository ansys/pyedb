exclude_paths:
  - "tests/**"
  - "doc/**"

engines:
  pydocstyle:
    enabled: true
    ignore:
      - D100
      - D101
      - D102
      - D103
      - D104
      - D105
      - D106
      - D200
      - D202
      - D203
      - D205
      - D208
      - D209
      - D210
      - D211
      - D212
      - D213
      - D214
      - D215
      - D301
      - D400
      - D401
      - D403
      - D404
      - D405
      - D406
      - D407
      - D409
      - D410
      - D411
      - D412
      - D413
      - D414
      - D419

