# =================================================================================================
# vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv    RUNNING ON SELF-HOSTED RUNNER    vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv
# =================================================================================================

  test-pyaedt-main-windows:
    name: Testing PyAEDT main branch (Windows)
    needs: [smoke-tests]
    runs-on: [ Windows, self-hosted, pyedb ]
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Create Python venv
        run: |
          python -m venv .venv
          . .venv\Scripts\Activate.ps1

      - name: Update pip
        run: |
          . .venv\Scripts\Activate.ps1
          python -m pip install -U pip

      - name: Clone PyAEDT on main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ansys/pyaedt
          path: "external/pyaedt"
          ref: "main"
          persist-credentials: false

      - name: Install PyAEDT main branch version with its test dependencies
        run: |
          . .venv\Scripts\Activate.ps1
          cd external/pyaedt
          pip install --no-cache-dir --group tests .

      - name: Install PyEDB
        run: |
          . .venv\Scripts\Activate.ps1
          python -m pip install .[all]

      - name: Run PyAEDT general and layout tests
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          PYTHONMALLOC: malloc
          PYAEDT_LOCAL_SETTINGS_PATH: 'external/pyaedt/tests/pyaedt_settings.yaml'
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 40
          command: |
            .venv\Scripts\Activate.ps1
            pytest -v external/pyaedt/tests/system/layout/test_3dlayout_edb.py
            pytest -v external/pyaedt/tests/system/general/test_configuration_files.py
            pytest -v external/pyaedt/tests/system/general/test_circuit.py

      - name: Run PyAEDT solvers tests
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          PYTHONMALLOC: malloc
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 40
          command: |
            .venv\Scripts\Activate.ps1
            pytest -v external/pyaedt/tests/system/solvers/test_analyze.py

      - name: Run PyAEDT extensions tests
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          PYTHONMALLOC: malloc
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 40
          command: |
            .venv\Scripts\Activate.ps1
            pytest -v external/pyaedt/tests/system/extensions/test_cutout.py
            pytest -v external/pyaedt/tests/system/extensions/test_configure_layout.py
            pytest -v external/pyaedt/tests/system/extensions/test_via_design.py
            pytest -v external/pyaedt/tests/system/extensions/test_parametrize_edb.py
            pytest -v external/pyaedt/tests/system/extensions/test_generate_arbitrary_wave_ports.py
            pytest -v external/pyaedt/tests/system/extensions/test_export_to_3d.py
            pytest -v external/pyaedt/tests/system/extensions/test_export_layout.py
            pytest -v external/pyaedt/tests/system/extensions/test_post_layout_design.py
            pytest -v external/pyaedt/tests/system/extensions/test_via_clustering.py

