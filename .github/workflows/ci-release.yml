            pytest -v external/pyaedt/tests/system/solvers/test_analyze.py

      - name: Run PyAEDT extensions tests
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          PYTHONMALLOC: malloc
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 50
          command: |
            . .venv/bin/activate
            pytest -v external/pyaedt/tests/system/extensions/test_cutout.py
            pytest -v external/pyaedt/tests/system/extensions/test_configure_layout.py
            pytest -v external/pyaedt/tests/system/extensions/test_via_design.py
            pytest -v external/pyaedt/tests/system/extensions/test_parametrize_edb.py
            pytest -v external/pyaedt/tests/system/extensions/test_generate_arbitrary_wave_ports.py
            pytest -v external/pyaedt/tests/system/extensions/test_export_to_3d.py
            pytest -v external/pyaedt/tests/system/extensions/test_export_layout.py
            pytest -v external/pyaedt/tests/system/extensions/test_post_layout_design.py
            pytest -v external/pyaedt/tests/system/extensions/test_via_clustering.py

  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Build documentation
        uses: ansys/actions/doc-build@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
        with:
          dependencies: "graphviz texlive-latex-extra latexmk texlive-xetex texlive-fonts-extra"
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          sphinxopts: '-j 1 --color -w build_errors.txt'
          check-links: false
          needs-quarto: true

  package:
    name: Package library
    needs: [system-tests-windows-dotnet,
            system-tests-windows-grpc,
            system-tests-linux-dotnet,
            system-tests-linux-grpc,
            docs-build]
    runs-on: ubuntu-latest
    permissions:
      attestations: write # Required to create and publish package attestations (SLSA provenance)
      contents: read
      id-token: write # Required for OIDC token generation (for provenance signing)
    steps:
      - name: Build library source and wheel artifacts
        uses: ansys/actions/build-library@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: true

  release:
    name: Release project
    needs: [package, test-pyaedt-main-windows, test-pyaedt-main-linux, update-changelog]
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: release
    permissions:
      id-token: write # Needed for trusted publishing OIDC
      contents: write # Needed for releasing to GitHub
    steps:

      - name: Download the library artifacts from build-library step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      - name: Release to PyPI using trusted publisher
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          print-hash: true
          packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
          skip-existing: false

      - name: Release to GitHub
        uses: ansys/actions/release-github@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          add-artifact-attestation-notes: true

  upload-docs-release:
    name: Upload release documentation
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: write # Needed to update files on the gh-pages branch
    steps:
      - name: Deploy the stable documentation
        uses: ansys/actions/doc-deploy-stable@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
