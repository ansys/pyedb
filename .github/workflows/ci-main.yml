name: GitHub CI - Main

on:
  push:
    branches:
      - main


env:
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
  PYEDB_CI_NO_DISPLAY: '1'
  MAIN_PYTHON_VERSION: '3.10'
  PACKAGE_NAME: 'pyedb'
  DOCUMENTATION_CNAME: 'edb.docs.pyansys.com'
  ON_CI: True

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  doc-build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Build documentation
        uses: ansys/actions/doc-build@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
        with:
          dependencies: "graphviz texlive-latex-extra latexmk texlive-xetex texlive-fonts-extra"
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          sphinxopts: '-j 1 --color -w build_errors.txt'
          check-links: false
          needs-quarto: true

  upload-dev-doc:
    name: Upload dev documentation
    runs-on: ubuntu-latest
    needs: doc-build
    permissions:
      contents: write  # Required to commit and push development documentation to gh-pages branch
    steps:
      - name: Upload development documentation
        uses: ansys/actions/doc-deploy-dev@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
        with:
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          use-python-cache: false
